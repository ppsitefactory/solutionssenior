<style>
  header {
    background: #ffffff;
    border-bottom: 1px solid #dde6df;
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 5%;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 76px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: #4a7c59;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
  }
  .logo-leaf {
    width: 36px;
    height: 36px;
    background: #4a7c59;
    border-radius: 50% 0 50% 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .header-nav {
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .header-nav a {
    text-decoration: none;
    color: #5a6b60;
    font-size: 1rem;
    font-weight: 500;
    transition: color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .header-nav a:hover { color: #4a7c59; }
  .header-nav .nav-cta {
    background: #4a7c59;
    color: white !important;
    padding: 11px 22px;
    border-radius: 50px;
    font-weight: 600 !important;
    font-size: 0.95rem !important;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .header-nav .nav-cta:hover { background: #6a9e78 !important; }

  /* Hamburger */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: #1e2a22;
    border-radius: 2px;
  }

  /* Menu mobile */
  .mobile-nav {
    display: none;
    position: fixed;
    inset: 0;
    background: white;
    z-index: 150;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: #1e2a22;
    text-decoration: none;
    font-weight: 700;
  }
  .mobile-nav a:hover { color: #4a7c59; }
  .mobile-nav-close {
    position: absolute;
    top: 24px;
    right: 24px;
    background: #f0f0f0;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @media (max-width: 960px) {
    .header-nav { display: none; }
    .hamburger { display: flex; }
  }
</style>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-leaf">🌿</div>
      Solutions Senior
    </a>
    <nav class="header-nav">
      <a href="/monte-escaliers/">Monte-escalier</a>
      <a href="/monte-escaliers/aides/">Aides financières</a>
      <a href="/qui-sommes-nous/">Qui sommes-nous</a>
      <a href="#" class="nav-cta open-formulaire">Je veux être rappelé gratuitement</a>
    </nav>
    <button class="hamburger" onclick="document.getElementById('mobileNav').classList.add('open'); document.body.style.overflow='hidden';" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- Menu mobile -->
<div class="mobile-nav" id="mobileNav">
  <button class="mobile-nav-close" onclick="document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow='';">✕</button>
  <a href="/monte-escaliers/" onclick="document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow='';">Monte-escalier</a>
  <a href="/monte-escaliers/aides/" onclick="document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow='';">Aides financières</a>
  <a href="/qui-sommes-nous/" onclick="document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow='';">Qui sommes-nous</a>
  <a href="/contact/" onclick="document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow='';">Nous contacter</a>
</div>
